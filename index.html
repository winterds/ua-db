<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Union Arena · Card Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111520;
    --surface2: #181d2e;
    --border: #1e2540;
    --border-glow: #2a3560;
    --text: #d8dff5;
    --text-muted: #6b7599;
    --accent: #4a90e2;
    --accent2: #7c5cbf;
    --yellow: #f0c040;
    --purple: #9b5de5;
    --gold: #ffd700;
    --sr: #ff6b35;
    --r: #4a90e2;
    --u: #7c5cbf;
    --c: #5a6a8a;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.jp-mode { font-family: 'Noto Sans JP', sans-serif; }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(180deg, #0d1220 0%, transparent 100%);
    border-bottom: 1px solid var(--border-glow);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #4a90e2, #9b5de5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .logo span { color: var(--yellow); -webkit-text-fill-color: var(--yellow); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .upload-btn {
    display: flex; align-items: center; gap-6px;
    background: var(--surface2);
    border: 1px solid var(--border-glow);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 1px;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--text); }
  #file-input { display: none; }

  /* ─── LANG TOGGLE ─── */
  .lang-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .lang-btn {
    padding: 7px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    background: transparent;
    border: none;
    color: var(--text-muted);
    transition: all .2s;
  }
  .lang-btn.active { background: var(--accent); color: #fff; }

  /* ─── MAIN LAYOUT ─── */
  .layout { display: flex; gap: 0; min-height: calc(100vh - 60px); }
  
  /* ─── SIDEBAR ─── */
  aside {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    max-height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
  }
  .filter-section h3 {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    transition: all .15s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { color: #fff; border-color: transparent; }
  .chip.all.active { background: var(--accent); }
  .chip.SR.active { background: var(--sr); }
  .chip.R.active  { background: var(--r); }
  .chip.U.active  { background: var(--u); }
  .chip.C.active  { background: var(--c); }
  .chip.Yellow.active { background: #b8860b; color: #ffe87a; border-color: var(--yellow); }
  .chip.Purple.active { background: #5a2d8a; color: #d4a8ff; border-color: var(--purple); }
  .chip.Character.active { background: #1a3a5c; color: #88c0ff; border-color: var(--accent); }
  .chip.Event.active    { background: #1a3a2a; color: #88ffcc; border-color: #40e0a0; }
  .chip.Field.active    { background: #3a2a1a; color: #ffcc88; border-color: #e09040; }
  
  .search-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  .stat-bar { display: flex; flex-direction: column; gap: 4px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; }
  .stat-label { color: var(--text-muted); }
  .stat-val { color: var(--accent); font-family: 'Share Tech Mono', monospace; font-weight: 700; }

  /* ─── CONTENT ─── */
  .content { flex: 1; padding: 24px; overflow: auto; }
  
  /* ─── UPLOAD ZONE ─── */
  .upload-zone {
    border: 2px dashed var(--border-glow);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    margin-bottom: 24px;
    cursor: pointer;
    transition: all .2s;
    display: none;
  }
  .upload-zone.visible { display: block; }
  .upload-zone:hover { border-color: var(--accent); background: rgba(74,144,226,0.05); }
  .upload-zone h3 { font-size: 16px; margin-bottom: 8px; }
  .upload-zone p { color: var(--text-muted); font-size: 13px; }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .result-count { color: var(--text-muted); font-size: 13px; letter-spacing: 1px; margin-left: auto; }
  .result-count strong { color: var(--text); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 6px; padding: 6px 10px;
    cursor: pointer; font-size: 14px; transition: all .15s;
  }
  .view-btn.active { border-color: var(--accent); color: var(--accent); }
  .sort-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 7px 10px;
    font-family: inherit; font-size: 13px; outline: none; cursor: pointer;
  }

  /* ─── CARD GRID ─── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .card-list { display: flex; flex-direction: column; gap: 8px; }
  
  /* ─── CARD ITEM (GRID) ─── */
  .card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
  }
  .card-item:hover {
    transform: translateY(-4px);
    border-color: var(--border-glow);
    box-shadow: 0 8px 32px rgba(74,144,226,.2);
  }
  .card-img-wrap {
    aspect-ratio: 3/4;
    background: var(--surface2);
    overflow: hidden;
    position: relative;
  }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform .3s;
  }
  .card-item:hover .card-img-wrap img { transform: scale(1.05); }
  .card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 28px;
  }
  .card-info { padding: 8px 10px; }
  .card-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .card-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .card-num { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .rarity-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 3px;
  }
  .rarity-SR { background: rgba(255,107,53,.2); color: var(--sr); border: 1px solid rgba(255,107,53,.4); }
  .rarity-R  { background: rgba(74,144,226,.2); color: var(--r); border: 1px solid rgba(74,144,226,.4); }
  .rarity-U  { background: rgba(124,92,191,.2); color: var(--u); border: 1px solid rgba(124,92,191,.4); }
  .rarity-C  { background: rgba(90,106,138,.15); color: var(--c); border: 1px solid rgba(90,106,138,.3); }
  .color-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .color-Yellow { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
  .color-Purple { background: var(--purple); box-shadow: 0 0 4px var(--purple); }

  /* ─── CARD ITEM (LIST) ─── */
  .card-list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .card-list-item:hover { border-color: var(--border-glow); background: var(--surface2); }
  .list-thumb { width: 40px; height: 54px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: var(--surface2); }
  .list-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .list-main { flex: 1; min-width: 0; }
  .list-name { font-size: 15px; font-weight: 600; }
  .list-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .list-tags { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .list-stats { display: flex; gap: 16px; flex-shrink: 0; }
  .stat-chip {
    display: flex; flex-direction: column; align-items: center;
    gap: 1px; min-width: 36px;
  }
  .stat-chip-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .stat-chip-val { font-size: 13px; font-weight: 700; font-family: 'Share Tech Mono', monospace; color: var(--text); }
  
  /* ─── MODAL ─── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px; backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: 16px;
    max-width: 680px; width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    gap: 0;
    transform: scale(.95); transition: transform .2s;
    box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(74,144,226,.1);
  }
  .modal-backdrop.open .modal { transform: scale(1); }
  .modal-img-col {
    width: 220px; flex-shrink: 0;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    border-radius: 16px 0 0 16px;
    overflow: hidden;
    position: relative;
  }
  .modal-img-col img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-body { flex: 1; padding: 24px; overflow-y: auto; }
  .modal-header { margin-bottom: 16px; }
  .modal-name { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
  .modal-num { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text-muted); }
  .modal-badges { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .badge {
    padding: 4px 10px; border-radius: 4px; font-size: 11px;
    font-weight: 700; letter-spacing: 1px;
  }
  .badge-color-Yellow { background: rgba(240,192,64,.15); color: var(--yellow); border: 1px solid rgba(240,192,64,.3); }
  .badge-color-Purple { background: rgba(155,93,229,.15); color: var(--purple); border: 1px solid rgba(155,93,229,.3); }
  .badge-type { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .modal-stats {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 8px; margin: 16px 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .modal-stat { text-align: center; }
  .modal-stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .modal-stat-val { font-size: 18px; font-weight: 700; font-family: 'Share Tech Mono', monospace; color: var(--text); margin-top: 2px; }
  .modal-effect-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .modal-effect {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; font-size: 13px;
    line-height: 1.7; color: var(--text);
    white-space: pre-wrap;
  }
  .modal-extra { display: flex; gap: 12px; margin-top: 12px; }
  .modal-extra-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 12px;
  }
  .modal-extra-chip span { color: var(--text-muted); margin-right: 4px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .close-btn {
    position: absolute; top: 12px; right: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; z-index: 10;
    transition: all .15s;
  }
  .close-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ─── EMPTY ─── */
  .empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .empty h3 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
  
  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    background: var(--surface); border: 1px solid var(--accent);
    border-radius: 8px; padding: 12px 20px;
    font-size: 14px; color: var(--text);
    transform: translateY(80px); opacity: 0;
    transition: all .3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    aside { display: none; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .modal { flex-direction: column; }
    .modal-img-col { width: 100%; height: 200px; border-radius: 16px 16px 0 0; border-right: none; border-bottom: 1px solid var(--border); }
    .logo { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">UNION ARENA <span>·</span> DB</div>
  <div class="header-right">
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">⬆ Upload CSV</button>
    <input type="file" id="file-input" accept=".csv" multiple onchange="handleFileUpload(event)">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-jp" onclick="setLang('jp')">JP</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="filter-section">
      <h3>Search</h3>
      <input class="search-box" id="search" placeholder="Card name..." oninput="applyFilters()">
    </div>
    <div class="filter-section">
      <h3>Rarity</h3>
      <div class="filter-chips" id="rarity-chips">
        <span class="chip all active" data-filter="rarity" data-val="all" onclick="toggleFilter(this)">All</span>
        <span class="chip SR" data-filter="rarity" data-val="SR" onclick="toggleFilter(this)">SR</span>
        <span class="chip R" data-filter="rarity" data-val="R" onclick="toggleFilter(this)">R</span>
        <span class="chip U" data-filter="rarity" data-val="U" onclick="toggleFilter(this)">U</span>
        <span class="chip C" data-filter="rarity" data-val="C" onclick="toggleFilter(this)">C</span>
      </div>
    </div>
    <div class="filter-section">
      <h3>Color</h3>
      <div class="filter-chips" id="color-chips">
        <span class="chip all active" data-filter="color" data-val="all" onclick="toggleFilter(this)">All</span>
        <span class="chip Yellow" data-filter="color" data-val="Yellow" onclick="toggleFilter(this)">Yellow</span>
        <span class="chip Purple" data-filter="color" data-val="Purple" onclick="toggleFilter(this)">Purple</span>
      </div>
    </div>
    <div class="filter-section">
      <h3>Type</h3>
      <div class="filter-chips" id="type-chips">
        <span class="chip all active" data-filter="type" data-val="all" onclick="toggleFilter(this)">All</span>
        <span class="chip Character" data-filter="type" data-val="Character" onclick="toggleFilter(this)">Character</span>
        <span class="chip Event" data-filter="type" data-val="Event" onclick="toggleFilter(this)">Event</span>
        <span class="chip Field" data-filter="type" data-val="Field" onclick="toggleFilter(this)">Field</span>
      </div>
    </div>
    <div class="filter-section">
      <h3>Stats</h3>
      <div class="stat-bar" id="stat-bar"></div>
    </div>
  </aside>

  <main class="content">
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <h3>Drop CSV files here</h3>
      <p>Upload EN and JP language CSVs to add them to the database</p>
    </div>
    <div class="toolbar">
      <div class="view-toggle">
        <button class="view-btn active" id="grid-btn" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="view-btn" id="list-btn" onclick="setView('list')" title="List">☰</button>
      </div>
      <select class="sort-select" onchange="applyFilters();" id="sort-select">
        <option value="num-asc">№ Ascending</option>
        <option value="num-desc">№ Descending</option>
        <option value="name-asc">Name A–Z</option>
        <option value="rarity-desc">Rarity (SR first)</option>
        <option value="power-desc">Power ↓</option>
      </select>
      <div class="result-count" id="result-count"></div>
    </div>
    <div id="card-container" class="card-grid"></div>
    <div class="empty" id="empty-state" style="display:none">
      <h3>No cards found</h3>
      <p>Try adjusting your filters</p>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-img-col" id="modal-img-col">
      <img id="modal-img" src="" alt="">
    </div>
    <div class="modal-body">
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
      <div class="modal-header">
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-num" id="modal-num"></div>
        <div class="modal-badges" id="modal-badges"></div>
      </div>
      <div class="modal-stats" id="modal-stats"></div>
      <div class="modal-effect-title">EFFECT</div>
      <div class="modal-effect" id="modal-effect"></div>
      <div class="modal-extra" id="modal-extra"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── STATE ───
let lang = 'en';
let cards = [];
let filteredCards = [];
let allData = { en: [], jp: [] };
let viewMode = 'grid';
let activeFilters = { rarity: 'all', color: 'all', type: 'all' };

// ─── INIT ───
function init() {
  allData.en = EMBEDDED.en;
  allData.jp = EMBEDDED.jp;
  loadLang();
}

function loadLang() {
  cards = allData[lang] || [];
  document.body.classList.toggle('jp-mode', lang === 'jp');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-jp').classList.toggle('active', lang === 'jp');
  // rebuild color/type chips dynamically
  rebuildFilterChips();
  applyFilters();
}

function rebuildFilterChips() {
  if (!cards.length) return;
  const colors = [...new Set(cards.map(c => c['Color']).filter(Boolean))];
  const types  = [...new Set(cards.map(c => c['Type']).filter(Boolean))];
  buildChips('color-chips', 'color', colors);
  buildChips('type-chips', 'type', types);
}

function buildChips(containerId, filterKey, values) {
  const el = document.getElementById(containerId);
  el.innerHTML = `<span class="chip all active" data-filter="${filterKey}" data-val="all" onclick="toggleFilter(this)">All</span>`;
  values.forEach(v => {
    const s = document.createElement('span');
    s.className = `chip ${v}`;
    s.dataset.filter = filterKey;
    s.dataset.val = v;
    s.textContent = v;
    s.onclick = function() { toggleFilter(this); };
    el.appendChild(s);
  });
  activeFilters[filterKey] = 'all';
}

// ─── FILTERS ───
function toggleFilter(el) {
  const filterKey = el.dataset.filter;
  const val = el.dataset.val;
  const container = el.closest('.filter-chips');
  container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilters[filterKey] = val;
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.trim().toLowerCase();
  const sort = document.getElementById('sort-select').value;
  const rarityOrder = { SR: 4, R: 3, U: 2, C: 1 };

  let result = cards.filter(c => {
    if (activeFilters.rarity !== 'all' && c['Rarity'] !== activeFilters.rarity) return false;
    if (activeFilters.color  !== 'all' && c['Color']  !== activeFilters.color)  return false;
    if (activeFilters.type   !== 'all' && c['Type']   !== activeFilters.type)   return false;
    if (search && !c['Card Name'].toLowerCase().includes(search)) return false;
    return true;
  });

  result.sort((a, b) => {
    switch (sort) {
      case 'num-asc':  return (a['Card Number']||'').localeCompare(b['Card Number']||'');
      case 'num-desc': return (b['Card Number']||'').localeCompare(a['Card Number']||'');
      case 'name-asc': return (a['Card Name']||'').localeCompare(b['Card Name']||'');
      case 'rarity-desc': return (rarityOrder[b['Rarity']]||0) - (rarityOrder[a['Rarity']]||0);
      case 'power-desc': return parseInt(b['Power']||0) - parseInt(a['Power']||0);
    }
    return 0;
  });

  filteredCards = result;
  renderCards();
  updateStats();
}

// ─── RENDER ───
function renderCards() {
  const container = document.getElementById('card-container');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');
  count.innerHTML = `Showing <strong>${filteredCards.length}</strong> of <strong>${cards.length}</strong> cards`;

  if (!filteredCards.length) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  if (viewMode === 'grid') {
    container.className = 'card-grid';
    container.innerHTML = filteredCards.map((c, i) => `
      <div class="card-item" onclick="openModal(${allData[lang].indexOf(c)})">
        <div class="card-img-wrap">
          ${c['Image'] ? `<img src="${c['Image']}" alt="${c['Card Name']}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-img-placeholder" style="display:none">🃏</div>` :
          `<div class="card-img-placeholder">🃏</div>`}
        </div>
        <div class="card-info">
          <div class="card-name">${c['Card Name']}</div>
          <div class="card-meta">
            <div class="color-dot color-${c['Color']}"></div>
            <span class="rarity-badge rarity-${c['Rarity']}">${c['Rarity']}</span>
            <span class="card-num">${(c['Card Number']||'').split('-').pop()}</span>
          </div>
        </div>
      </div>`).join('');
  } else {
    container.className = 'card-list';
    container.innerHTML = filteredCards.map(c => `
      <div class="card-list-item" onclick="openModal(${allData[lang].indexOf(c)})">
        <div class="list-thumb">
          ${c['Image'] ? `<img src="${c['Image']}" alt="${c['Card Name']}" loading="lazy">` : '🃏'}
        </div>
        <div class="list-main">
          <div class="list-name">${c['Card Name']}</div>
          <div class="list-sub">${c['Card Number']}</div>
          <div class="list-tags" style="margin-top:4px">
            <div class="color-dot color-${c['Color']}"></div>
            <span class="rarity-badge rarity-${c['Rarity']}">${c['Rarity']}</span>
            <span style="font-size:11px;color:var(--text-muted)">${c['Type']}</span>
          </div>
        </div>
        <div class="list-stats">
          <div class="stat-chip">
            <div class="stat-chip-label">Power</div>
            <div class="stat-chip-val">${c['Power']||'—'}</div>
          </div>
          <div class="stat-chip">
            <div class="stat-chip-label">Energy</div>
            <div class="stat-chip-val">${c['Energy Cost']||'—'}</div>
          </div>
          <div class="stat-chip">
            <div class="stat-chip-label">AP</div>
            <div class="stat-chip-val">${c['AP Cost']||'—'}</div>
          </div>
        </div>
      </div>`).join('');
  }
}

// ─── STATS ───
function updateStats() {
  const bar = document.getElementById('stat-bar');
  const total = filteredCards.length;
  const bySR = filteredCards.filter(c => c['Rarity']==='SR').length;
  const byR  = filteredCards.filter(c => c['Rarity']==='R').length;
  const byU  = filteredCards.filter(c => c['Rarity']==='U').length;
  const byC  = filteredCards.filter(c => c['Rarity']==='C').length;
  bar.innerHTML = `
    <div class="stat-row"><span class="stat-label">SR</span><span class="stat-val" style="color:var(--sr)">${bySR}</span></div>
    <div class="stat-row"><span class="stat-label">R</span><span class="stat-val" style="color:var(--r)">${byR}</span></div>
    <div class="stat-row"><span class="stat-label">U</span><span class="stat-val" style="color:var(--u)">${byU}</span></div>
    <div class="stat-row"><span class="stat-label">C</span><span class="stat-val" style="color:var(--c)">${byC}</span></div>
    <div class="stat-row" style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px">
      <span class="stat-label">Total</span><span class="stat-val">${total}</span>
    </div>`;
}

// ─── MODAL ───
function openModal(idx) {
  const c = allData[lang][idx];
  if (!c) return;
  document.getElementById('modal-name').textContent = c['Card Name'];
  document.getElementById('modal-num').textContent = c['Card Number'];
  document.getElementById('modal-img').src = c['Image'] || '';
  document.getElementById('modal-img-col').style.display = c['Image'] ? 'block' : 'none';
  document.getElementById('modal').style.maxWidth = c['Image'] ? '680px' : '460px';

  document.getElementById('modal-badges').innerHTML = `
    <span class="rarity-badge rarity-${c['Rarity']}">${c['Rarity']}</span>
    <span class="badge badge-color-${c['Color']}">${c['Color']}</span>
    <span class="badge badge-type">${c['Type']}</span>`;

  document.getElementById('modal-stats').innerHTML = `
    <div class="modal-stat"><div class="modal-stat-label">Power</div><div class="modal-stat-val">${c['Power']||'—'}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Energy</div><div class="modal-stat-val">${c['Energy Cost']||'—'}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">AP Cost</div><div class="modal-stat-val">${c['AP Cost']||'—'}</div></div>`;

  document.getElementById('modal-effect').textContent = c['Effect'] || 'No effect text.';

  const extras = [];
  if (c['Trigger'] && c['Trigger'] !== '-') extras.push(`<div class="modal-extra-chip"><span>Trigger</span>${c['Trigger']}</div>`);
  if (c['Generate Energy'] === 'Y') extras.push(`<div class="modal-extra-chip"><span>Generates</span>⚡ Energy</div>`);
  if (c['Attributes'] && c['Attributes'] !== '-') extras.push(`<div class="modal-extra-chip"><span>Attr</span>${c['Attributes']}</div>`);
  document.getElementById('modal-extra').innerHTML = extras.join('');

  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ─── LANG ───
function setLang(l) {
  lang = l;
  loadLang();
}

// ─── VIEW ───
function setView(v) {
  viewMode = v;
  document.getElementById('grid-btn').classList.toggle('active', v==='grid');
  document.getElementById('list-btn').classList.toggle('active', v==='list');
  renderCards();
}

// ─── FILE UPLOAD ───
function handleFileUpload(event) {
  const files = Array.from(event.target.files);
  files.forEach(f => parseCSV(f));
  event.target.value = '';
}
function handleDrop(event) {
  event.preventDefault();
  Array.from(event.dataTransfer.files).filter(f => f.name.endsWith('.csv')).forEach(f => parseCSV(f));
}
function parseCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSVText(e.target.result);
    if (!rows.length) return;
    const isJP = /[ぁ-んァ-ン一-龥]/.test(rows[0]?.['Card Name'] || '');
    const target = isJP ? 'jp' : 'en';
    allData[target] = rows;
    showToast(`✓ Loaded ${rows.length} cards (${target.toUpperCase()}) from ${file.name}`);
    if (target === lang) loadLang();
  };
  reader.readAsText(file, 'utf-8');
}
function parseCSVText(text) {
  // BOM strip
  text = text.replace(/^\uFEFF/, '');
  const lines = [];
  let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === '\n' && !inQ) { lines.push(cur); cur = ''; }
    else if (ch === '\r' && !inQ) {}
    else cur += ch;
  }
  if (cur) lines.push(cur);
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').trim());
    return obj;
  });
}
function splitCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i <= line.length; i++) {
    const ch = line[i];
    if (i === line.length) { res.push(cur); break; }
    if (ch === '"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
    else if (ch === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += ch;
  }
  return res;
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
